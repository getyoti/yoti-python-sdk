name: Unit Tests
on: [push, pull_request]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [3.9, "3.10","3.11","3.12"]

    steps:
      - uses: actions/checkout@v2

      - uses: actions/setup-python@v2.3.1
        with:
          python-version: ${{ matrix.python-version }}

      - run: pip install --only-binary :all: "setuptools==75.8.2"

      - run: pip install --only-binary :all: -r requirements.txt

      - run: pip install -e .[dev]  # NOSONAR: local source install, trusted code

      - run: pytest -v

  examples:
    name: Check Examples
    runs-on: ubuntu-latest 

    steps:
      - uses: actions/checkout@v2

      - uses: actions/setup-python@v2.3.1
        with:
          python-version: 3.9

      - run: pip install --only-binary :all: "setuptools==75.8.2"

      - run: pip install -e .  # NOSONAR: local source install, trusted code

      - run: pushd examples/aml && pip install --only-binary :all: -r requirements.txt && popd

      - run: pushd examples/yoti_example_django && pip install --only-binary :all: "pip==25.1.1" && pip install --only-binary :all: -r requirements.txt && popd

        # Reinstall local SDK after AML/Django, which pin yoti==2.14.0 from PyPI and override it
      - run: pip install -e .  # NOSONAR: local source install, trusted code

      - run: pushd examples/yoti_example_flask && pip install --only-binary :all: -r requirements.txt && popd

      - run: pushd examples/doc_scan && pip install --only-binary :all: -r requirements.txt && popd
